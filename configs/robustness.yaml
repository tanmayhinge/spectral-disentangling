# Phase 6: robustness sweep over the difficulty knob.
# Self-contained: pretrains a fresh encoder per difficulty, so it does NOT depend on
# experiments/pretrained_encoder.pt. The `data.difficulty` block below sets the endpoints
# that `difficulties` interpolates between (see DataConfig.at_difficulty).

data:
  base_seed: 0
  n_samples: 10000
  grid:
    ppm_min: 0.0
    ppm_max: 10.0
    n_points: 2048
  library:
    n_compounds: 12
    seed: 1234
    path: assets/library.json
    peaks_min: 2
    peaks_max: 5
    lineshape: lorentzian
    width_min_ppm: 0.02
    width_max_ppm: 0.045
    amp_min: 0.5
    amp_max: 1.0
    spectrometer_mhz: 300.0
    j_min_hz: 6.0
    j_max_hz: 14.0
    regions:
      - {name: aromatic,  ppm_min: 6.5, ppm_max: 8.5, weight: 0.35}
      - {name: mid,       ppm_min: 3.0, ppm_max: 4.8, weight: 0.20}
      - {name: aliphatic, ppm_min: 0.5, ppm_max: 3.0, weight: 0.45}
    multiplicities:      [1, 2, 3, 4]
    multiplicity_probs:  [0.45, 0.30, 0.15, 0.10]
  mixture:
    k_min: 2
    k_max: 5
    conc_min: 0.3
    conc_max: 1.0
  corruptions:
    snr: 30.0
    baseline_frac: 0.05
    baseline_n_waves: 3
    jitter_ppm: 0.004
    phase_deg: 0.0
  difficulty:
    snr_easy: 40.0
    snr_hard: 6.0
    kmax_easy: 2
    kmax_hard: 5
    jitter_easy_ppm: 0.002
    jitter_hard_ppm: 0.010

model:
  patch_size: 32
  d_model: 128
  n_heads: 4
  n_layers: 4
  dim_feedforward: 256
  dropout: 0.1
  pool: cls

robustness:
  difficulties: [0.0, 0.25, 0.5, 0.75, 1.0]   # 0 = easy end, 1 = hard end
  seeds: [0, 1, 2]

  # Per-difficulty masked pretraining. Recipe matches configs/pretrain.yaml so results are
  # comparable to Phase 3; one encoder per difficulty, shared across seeds.
  n_pretrain: 20000
  n_pretrain_eval: 512
  pretrain_seed: 20000        # unlabeled stream, disjoint from train/val/probe
  pretrain_model_seed: 0      # model init + mask stream
  pretrain_epochs: 20
  pretrain_batch_size: 128
  pretrain_lr: 0.0003
  pretrain_weight_decay: 0.01
  mask_ratio: 0.5
  span_len: 4
  encoder_dir: experiments/robustness

  # Fine-tuning arm: pretrained vs scratch. Recipe matches configs/finetune_sweep.yaml.
  # Small budgets only -- Phase 4 showed the arms converge once labels are plentiful.
  ft_label_sizes: [40, 160]
  max_steps: 600
  eval_every: 100
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.01
  threshold: 0.5
  labeled_seed_base: 1000

  # Probe arm: frozen linear probes. Recipe matches configs/probe.yaml.
  probe_train_n: 2560
  probe_val_n: 1000
  probe_seed_base: 3000
  pool: mean
  probe_steps: 300
  probe_lr: 0.01
  include_supervised: true
  supervised_train_n: 4000
  supervised_steps: 1200
  supervised_lr: 0.0003
  supervised_seed: 5000

  val_seed: 10001
  n_val: 1000
  device: auto
